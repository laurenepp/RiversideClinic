<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <!-- adds extra language library to fix the punctuations -->
  <title>Riverside Clinic</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <div class="app">
    <div class="sidebar">
      <div class="brand">
        <div class="logo">RC</div>
        <div class="title">
          <div class="name">Riverside</div>
          <div class="sub">Clinic Portal</div>
        </div>
      </div>

      <div id="menu"></div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="user-chip">
          <div class="user-dot"></div>
          <span id="welcome"></span>
        </div>
        <!--<button class="ghost" onclick="logout()">Logout</button>-->
        <button class="ghost" onclick="doLogout()">Logout</button>
      </div>

      <div id="content"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/router.js"></script>
  

  <!-- Role modules -->
  <script src="js/roles/receptionist.js"></script>
  <script src="js/roles/doctor.js"></script>
  <script src="js/roles/nurse.js"></script>
  <script src="js/roles/admin.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
